    <p>如需 ViralForge 使用帮助，请发送邮件至 <a href="mailto:philyu2023@qq.com">philyu2023@qq.com</a>。</p>

    <h2>恢复购买</h2>
    <p>打开 ViralForge，进入设置页或会员页，点击“恢复购买”。请确认当前 Apple ID 与购买订阅时一致。</p>

    <h2>生成问题</h2>
    <p>如生成失败，请检查网络并重试。如开启后端模式，请确认后端地址可访问。</p>

    <h2>数据删除</h2>
    <p>如需删除后端同步数据，请将 App 内用户 ID 发送至 <a href="mailto:philyu2023@qq.com">philyu2023@qq.com</a>。仅保存在本机的数据可通过卸载 App 删除。</p>
