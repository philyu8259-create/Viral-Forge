name: ViralForge
options:
  bundleIdPrefix: com.phil
  schemePathPrefix: "../../../"
  deploymentTarget:
    iOS: "17.0"
fileGroups:
  - ViralForge.storekit
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: ""
targets:
  ViralForge:
    type: application
    platform: iOS
    sources:
      - ViralForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phil.viralforge
        PRODUCT_NAME: ViralForge
        INFOPLIST_FILE: ViralForge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          BACKEND_BASE_URL: "http://localhost:8787"
        Release:
          BACKEND_BASE_URL: "https://viralfo-backend-ipiunjbsno.cn-hangzhou.fcapp.run"
    scheme:
      testTargets:
        - ViralForgeUITests
      storeKitConfiguration: ViralForge.storekit
    attributes:
      SystemCapabilities:
        com.apple.InAppPurchase:
          enabled: 1
  ViralForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ViralForgeUITests
    dependencies:
      - target: ViralForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phil.viralforge.uitests
        TEST_TARGET_NAME: ViralForge
        GENERATE_INFOPLIST_FILE: YES
