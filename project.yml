name: ViralForge
options:
  bundleIdPrefix: com.phil
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  ViralForge:
    type: application
    platform: iOS
    sources:
      - ViralForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phil.viralforge
        PRODUCT_NAME: ViralForge
        INFOPLIST_FILE: ViralForge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
      configs:
        Debug:
          BACKEND_BASE_URL: "http://localhost:8787"
        Release:
          BACKEND_BASE_URL: ""
    scheme:
      testTargets: []
      run:
        storeKitConfiguration: ViralForge.storekit
    attributes:
      SystemCapabilities:
        com.apple.InAppPurchase:
          enabled: 1
